name: Publish to crates.io

on:
  push:
    tags:
      - 'crate-*'
      - 'crates-*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-22.04
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN || secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure token is available
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN/CRATES_IO_TOKEN secret is not set" >&2
            exit 1
          fi

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install publish helper
        run: |
          cat > /tmp/publish_if_needed.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          manifest_path="$1"
          package_name="$2"

          version="$(
            awk -F'"' '
              /^\[package\]/ { in_package = 1; next }
              /^\[/ && $0 != "[package]" { in_package = 0 }
              in_package && $1 ~ /^version = / { print $2; exit }
            ' "$manifest_path"
          )"

          if [ -z "$version" ]; then
            echo "Could not determine version for $package_name from $manifest_path" >&2
            exit 1
          fi

          if curl --silent --show-error --fail \
            "https://crates.io/api/v1/crates/$package_name/$version" >/dev/null; then
            echo "$package_name $version already exists on crates.io; skipping publish"
            exit 0
          fi

          cargo publish -p "$package_name" --locked
          EOF

          chmod +x /tmp/publish_if_needed.sh

      - name: Publish `opt`
        run: /tmp/publish_if_needed.sh opt/Cargo.toml opt

      - name: Publish `wolfe_bfgs`
        run: |
          for attempt in $(seq 1 20); do
            if /tmp/publish_if_needed.sh wolfe_bfgs/Cargo.toml wolfe_bfgs; then
              exit 0
            fi

            if [ "$attempt" -eq 20 ]; then
              echo "Failed to publish wolfe_bfgs after waiting for crates.io to index opt" >&2
              exit 1
            fi

            echo "wolfe_bfgs publish failed; waiting for crates.io to index opt (attempt $attempt/20)"
            sleep 30
          done
